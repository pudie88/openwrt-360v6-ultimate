name: OpenWrt Builder

on:
  push:
    branches:
      - main
    paths:
      - '.config'
      - '.github/workflows/*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual build trigger'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-openwrt:
    runs-on: ubuntu-latest
    container:
      image: openwrtorg/sdk:latest
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "=== Environment Info ==="
          uname -a
          df -h
          free -h

      - name: Debug configuration
        run: |
          echo "=== Configuration Debug ==="
          grep -E "^(CONFIG_TARGET_ROOTFS_PARTSIZE=|CONFIG_PACKAGE_sing-box=|CONFIG_PACKAGE_dockerd=|CONFIG_PACKAGE_samba4-server=|CONFIG_PACKAGE_adguardhome=|CONFIG_PACKAGE_lucky=)" .config || true
          echo "=== Key config values ==="
          echo "PARTSIZE: $(grep '^CONFIG_TARGET_ROOTFS_PARTSIZE=' .config || echo 'NOT FOUND')"
          echo "sing-box: $(grep '^CONFIG_PACKAGE_sing-box=' .config || echo 'NOT FOUND')"

      - name: Validate PARTSIZE for 70MB build
        run: |
          if ! grep -q "^CONFIG_TARGET_ROOTFS_PARTSIZE=20" .config; then
            echo "❌ PARTSIZE is not 20"
            grep "PARTSIZE" .config || echo "(not found)"
            exit 1
          fi
          echo "✅ PARTSIZE=20 validated (extreme minimal)"

      - name: Validate sing-box is retained
        run: |
          if grep -q "^CONFIG_PACKAGE_sing-box=y" .config; then
            echo "✅ sing-box is enabled"
          else
            echo "❌ sing-box is not enabled"
            exit 1
          fi

      - name: Calculate config size
        run: |
          echo "=== Configuration Summary ==="
          enabled_count=$(grep "=y$" .config | wc -l)
          disabled_count=$(grep "=n$" .config | wc -l)
          echo "Enabled packages: $enabled_count"
          echo "Disabled packages: $disabled_count"
          
          echo "=== Heavy packages check ==="
          for pkg in dockerd samba4-server adguardhome lucky; do
            if grep -q "^CONFIG_PACKAGE_\${pkg}=y" .config; then
              echo "❌ $pkg is ENABLED (should be disabled)"
            else
              echo "✅ $pkg is disabled"
            fi
          done

      - name: Prepare OpenWrt build
        run: |
          echo "=== Setting up OpenWrt build ==="
          cd /openwrt
          
          # 复制配置文件
          cp /github/workspace/.config .
          
          # 应用配置
          make defconfig

      - name: Download feeds
        run: |
          cd /openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 检查是否有sing-box包
          if ./scripts/feeds list | grep -q sing-box; then
            echo "✅ sing-box feed available"
          else:
            echo "⚠️ sing-box feed not found, trying to install from source"

      - name: Build firmware (optimized for speed)
        run: |
          cd /openwrt
          echo "=== Starting build ==="
          echo "CPU cores: $(nproc)"
          echo "Memory: $(free -h)"
          
          # 使用多核编译，但限制内存使用
          make -j$(($(nproc) / 2)) V=s 2>&1 | tee build.log || true
          
          # 检查是否构建成功
          if find bin -name "*.bin" -o -name "*.img" | head -1; then
            echo "✅ Build succeeded!"
          else:
            echo "❌ Build failed, checking logs..."
            tail -50 build.log
            exit 1

      - name: Check firmware size
        run: |
          cd /openwrt
          echo "=== Firmware size check ==="
          find bin -name "*.bin" -o -name "*.img" | while read f; do
            size_bytes=$(stat -c%s "$f")
            size_mb=$((size_bytes / 1024 / 1024))
            echo "$f: ${size_mb}MB"
            
            # 验证大小是否在70MB以内
            if [ $size_mb -gt 75 ]; then
              echo "❌ Firmware too large: ${size_mb}MB > 70MB target"
              exit 1
            else:
              echo "✅ Firmware size OK: ${size_mb}MB ≤ 70MB target"
            fi
          done

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: /openwrt/bin/
          if-no-files-found: error
          retention-days: 7
