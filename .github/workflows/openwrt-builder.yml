name: Build OpenWrt for 360 V6 (128MB Optimized)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/openwrt-builder.yml'
      - '.config'
      - 'files/'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 480
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🗑 Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile
          echo "=== 释放后磁盘空间 ==="
          df -h

      - name: 🛠 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3 python3-pip \
            rsync swig unzip zlib1g-dev wget curl ca-certificates file

      - name: 📥 Clone Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: 📦 Install Custom Packages
        run: |
          cd openwrt

          # ── Argon 主题 ────────────────────────────────────────────────
          rm -rf package/luci-theme-argon
          git clone --depth 1 https://github.com/jerrykuku/luci-theme-argon.git \
            package/luci-theme-argon
          echo "✅ luci-theme-argon 克隆完成"

          # ── HomeProxy ─────────────────────────────────────────────────
          rm -rf package/homeproxy
          git clone --depth 1 https://github.com/immortalwrt/homeproxy.git \
            package/homeproxy
          echo "✅ homeproxy 克隆完成"

          # ── Lucky（sirpdboy 版本）─────────────────────────────────────
          if find feeds -name "luci-app-lucky" -maxdepth 6 -type d 2>/dev/null | grep -q .; then
            echo "✅ luci-app-lucky 已在 feeds 中"
          else
            rm -rf package/luci-app-lucky
            git clone --depth 1 https://github.com/sirpdboy/luci-app-lucky.git \
              package/luci-app-lucky \
              && echo "✅ luci-app-lucky 克隆完成" \
              || echo "⚠️  luci-app-lucky 克隆失败"
          fi

      - name: 🔄 Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ⚙️ Apply Config & Validate PARTSIZE=100
        run: |
          cd openwrt

          # ── 1. 验证 PARTSIZE=100 ──────────────────────────────
          if ! grep -q "^CONFIG_TARGET_ROOTFS_PARTSIZE=100" .config; then
            echo "❌ 错误: PARTSIZE 不是 100，当前配置:"
            grep "PARTSIZE" .config
            echo "请确保 .config 中 CONFIG_TARGET_ROOTFS_PARTSIZE=100"
            exit 1
          fi
          echo "✅ PARTSIZE=100 验证通过（128MB 闪存优化）"

          # ── 2. 验证大包编译设置 ────────────────────────────────
          echo "=== 大包编译状态验证 ==="
          for PKG in dockerd samba4-server adguardhome lucky; do
            if grep -q "^CONFIG_PACKAGE_${PKG}=y" .config; then
              echo "✅ $PKG = y（编译进固件）"
            else
              echo "❌ $PKG ≠ y，请设为 y"
              exit 1
            fi
          done

          # ── 3. 验证 USB 支持 ──────────────────────────────────
          if ! grep -q "^CONFIG_PACKAGE_kmod-usb-storage=y" .config; then
            echo "❌ USB 存储支持未启用"
            exit 1
          fi
          echo "✅ USB 存储支持已启用"

          # ── 4. 移除 sing-box-tiny 冲突 ──────────────────────────────
          SINGBOX_MK="feeds/packages/net/sing-box/Makefile"
          if [ -f "$SINGBOX_MK" ]; then
            sed -i '/define Package\/sing-box-tiny/,/^endef/d' "$SINGBOX_MK"
            sed -i '/BuildPackage,sing-box-tiny/d' "$SINGBOX_MK"
            echo "✅ 已移除 sing-box-tiny"
          fi

          # ── 5. 检查可选包 ─────────────────────────────────────
          for PKG in luci-app-fileassistant luci-app-crontabs luci-app-cpufreq \
                     luci-app-lucky luci-app-dockerman; do
            if find feeds package -name "$PKG" -maxdepth 6 -type d 2>/dev/null | grep -q .; then
              echo "✅ $PKG 存在"
            else
              echo "⚠️  $PKG 未找到，将由 defconfig 自动跳过"
            fi
          done

          # ── 6. 设备锁定（只保留 qihoo_360v6）──────────────────────
          MK="target/linux/qualcommax/image/ipq60xx.mk"
          if [ ! -f "$MK" ]; then
            echo "❌ 设备定义文件不存在: $MK"
            exit 1
          fi
          sed -i '/^TARGET_DEVICES +=/d' "$MK"
          echo 'TARGET_DEVICES += qihoo_360v6' >> "$MK"
          echo "=== 修改后 TARGET_DEVICES ==="
          grep "TARGET_DEVICES" "$MK"

          # ── 7. 复制并应用配置 ──────────────────────────────────────
          cp "${GITHUB_WORKSPACE}/.config" .config

          # 去掉旧的设备锁定和 PARTSIZE
          sed -i '/CONFIG_TARGET_.*DEVICE.*/d' .config
          sed -i '/CONFIG_TARGET_ROOTFS_PARTSIZE/d' .config
          sed -i '/# CONFIG_PACKAGE_luci-app-opkg is not set/d' .config

          # 重新写入设备锁定
          echo 'CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y' > .temp
          cat .config >> .temp
          mv .temp .config
          echo "✅ 设备锁定写入完成"

          # 展开配置
          make defconfig 2>&1 | tail -5

          # 最终验证
          if grep -q "^CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "✅ 设备锁定：qihoo_360v6"
          else
            echo "❌ 设备锁定失败"
            grep "CONFIG_TARGET_.*DEVICE.*=y" .config
            exit 1
          fi

          # ── 8. 验证配置最终状态 ──────────────────────────────────
          echo "=== 最终配置关键项 ==="
          grep -E "PARTSIZE|dockerd|samba4-server|adguardhome|lucky" .config

          # ── 9. 复制预置配置文件（含 USB 挂载脚本）────────────────
          mkdir -p files/etc/uci-defaults
          mkdir -p files/etc/sysctl.d
          mkdir -p files/root
          cp "${GITHUB_WORKSPACE}/files/etc/uci-defaults/99-custom-ip" \
             files/etc/uci-defaults/99-custom-ip
          cp "${GITHUB_WORKSPACE}/files/etc/sysctl.d/99-bbr.conf" \
             files/etc/sysctl.d/99-bbr.conf
          cp "${GITHUB_WORKSPACE}/files/etc/uci-defaults/98-network-check" \
             files/etc/uci-defaults/98-network-check
          cp "${GITHUB_WORKSPACE}/files/etc/uci-defaults/97-fix-apk-feeds" \
             files/etc/uci-defaults/97-fix-apk-feeds
          cp "${GITHUB_WORKSPACE}/files/etc/uci-defaults/96-install-docker" \
             files/etc/uci-defaults/96-install-docker
          cp "${GITHUB_WORKSPACE}/files/etc/uci-defaults/95-install-extras" \
             files/etc/uci-defaults/95-install-extras
          cp "${GITHUB_WORKSPACE}/files/etc/uci-defaults/94-mount-usb-docker" \
             files/etc/uci-defaults/94-mount-usb-docker
          cp "${GITHUB_WORKSPACE}/files/root/flashing-guide.txt" \
             files/root/flashing-guide.txt
          
          # 设置执行权限
          chmod +x files/etc/uci-defaults/94-mount-usb-docker
          chmod +x files/etc/uci-defaults/95-install-extras
          chmod +x files/etc/uci-defaults/96-install-docker
          chmod +x files/etc/uci-defaults/97-fix-apk-feeds
          chmod +x files/etc/uci-defaults/98-network-check
          chmod +x files/etc/uci-defaults/99-custom-ip
          
          echo "✅ 预置配置文件已复制（含 94-mount-usb-docker）"
          echo "=== USB 存储配置 ==="
          echo "脚本: 94-mount-usb-docker（自动挂载 USB，配置 Docker 数据目录）"
          echo "策略: 大包二进制在固件，运行时数据在 USB"
          echo "空间: overlay 100MB（固件） + USB 无限扩展"

      - name: ⬇️ Download Packages
        run: |
          cd openwrt
          make download -j$(nproc)
          # 删除下载不完整的文件
          find dl -size -1024c -exec rm -f {} \;

      - name: 🔨 Compile Firmware
        id: compile
        run: |
          cd openwrt
          set -o pipefail
          echo "🔨 开始多线程编译 ($(nproc) 线程)..."
          if make -j$(nproc) 2>&1 | tee build.log; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ 多线程编译成功"
          else
            echo "⚠️ 多线程失败，降级单线程输出完整日志..."
            make -j1 V=s > build-verbose.log 2>&1
            MAKE_EXIT=$?
            cat build-verbose.log >> build.log
            if [ $MAKE_EXIT -eq 0 ]; then
              echo "status=success" >> $GITHUB_OUTPUT
              echo "✅ 单线程编译成功"
            else
              echo "status=failure" >> $GITHUB_OUTPUT
              echo "========================================"
              echo "❌ 编译失败，关键错误："
              echo "========================================"
              grep -iE "error:|fatal error:|undefined reference|No rule to make|cannot find|Error [0-9]" \
                build-verbose.log | grep -v "^#" | grep -v "Werror" | tail -60
              exit 1
            fi
          fi

      - name: 📦 Prepare Artifacts & Size Check (≤110MB)
        if: steps.compile.outputs.status == 'success'
        run: |
          TARGET_DIR="openwrt/bin/targets/qualcommax/ipq60xx"
          if [ ! -d "$TARGET_DIR" ]; then
            echo "❌ 目标目录不存在"
            find openwrt/bin/targets -type d -maxdepth 3
            exit 1
          fi
          cd "$TARGET_DIR"
          echo "📂 输出文件列表："
          ls -lh
          
          # ── 固件大小检查（必须 ≤110MB）────────────────────────
          SYSUPGRADE_FILE=$(ls *360v6*squashfs-sysupgrade.bin 2>/dev/null | head -1)
          if [ -n "$SYSUPGRADE_FILE" ]; then
            FILE_SIZE=$(stat -c%s "$SYSUPGRADE_FILE")
            FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            echo "固件大小: $SYSUPGRADE_FILE = ${FILE_SIZE_MB}MB"
            
            if [ $FILE_SIZE_MB -gt 110 ]; then
              echo "❌ 错误: 固件大小 ${FILE_SIZE_MB}MB > 110MB"
              echo "可能原因:"
              echo "  1. PARTSIZE 不是 100"
              echo "  2. 大包没有全部编译进固件"
              echo "  3. 配置验证失败"
              exit 1
            else
              echo "✅ 固件大小 ${FILE_SIZE_MB}MB ≤ 110MB（适合 128MB 闪存）"
            fi
          else
            echo "⚠️  未找到 sysupgrade.bin 文件"
          fi
          
          mkdir -p output
          cp *360v6* output/ 2>/dev/null || true
          cp sha256sums output/ 2>/dev/null || true
          
          if ! ls output/*360v6* >/dev/null 2>&1; then
            echo "❌ 未找到 360 V6 固件"
            exit 1
          fi
          echo "✅ 固件验证通过"
          ls -lh output/
          echo "FIRMWARE_PATH=$PWD/output" >> $GITHUB_ENV

      - name: 🚀 Upload to Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-v${{ github.run_number }}
          name: OpenWrt 360 V6 (${{ env.BUILD_DATE }})
          body: |
            ## 📦 OpenWrt for 360 V6 (128MB Flash Optimized)
            - **版本: ImmortalWrt master (SNAPSHOT)
            - 构建时间: ${{ env.BUILD_DATE }}
            - 源码 Commit: ${{ env.OPENWRT_COMMIT }}
            - **固件大小**: ≤110MB（适合 128MB 闪存）
            - **存储策略**: 大包二进制在固件，运行时数据在 USB 硬盘
            - **USB 要求**: 建议插入 USB 硬盘以获得完整 Docker/Samba 功能
            
            ### 📦 空间优化策略
            ```
            128MB 闪存分配:
            ├── Squashfs（只读系统）: ~30MB
            ├── Overlay（可写分区）: 100MB
            │   ├── Docker 二进制: 60MB
            │   ├── Samba4-server: 15MB
            │   ├── AdGuardHome: 10MB
            │   ├── Lucky: 5MB
            │   └── 其他: 10MB
            └── USB 硬盘（扩展）: 无限
                ├── Docker 数据
                ├── Samba 共享文件
                └── 其他运行时数据
            ```

            ### 🔌 USB 存储使用
            1. **插入 USB 硬盘**（推荐 ext4/NTFS 格式）
            2. **首次启动**自动挂载并配置数据目录
            3. **Docker 数据**存储在 `/mnt/usb_docker/docker/`
            4. **Samba 共享**目录在 `/mnt/usb_docker/samba/`
            5. **无 USB 模式**: 使用 overlay 分区（100MB 限制）

            ### ✨ 已内置功能
            - ✅ 中文界面 + Argon 主题
            - ✅ HomeProxy + sing-box 代理
            - ✅ Docker + dockerman（数据在 USB）
            - ✅ Samba4 文件共享（共享目录在 USB）
            - ✅ AdGuardHome 广告过滤（数据在 USB）
            - ✅ Lucky 内网穿透
            - ✅ 文件管理器 fileassistant
            - ✅ USB 自动挂载 + 磁盘管理
            - ✅ 网络唤醒、定时重启、计划任务
            - ✅ IPv6 支持、DDNS、流量监控
            - ✅ BBR 拥塞控制 + SFE 加速

            ### ⚠️ 刷机前重要提示
            1. **电脑设置静态 IP**：
               - IP: 192.168.2.100
               - 掩码: 255.255.255.0
               - 网关: 192.168.2.1
            2. **刷机后访问地址**：http://192.168.2.1
            3. **如果无法连接**：
               - 重启电脑和路由器
               - 检查电脑防火墙
               - 尝试 30/30/30 硬重置

            ### 📌 默认信息
            - 管理地址：**http://192.168.2.1**
            - 用户名：root，密码：无（首次登录请立即设置密码）
            - USB 支持：自动挂载 ext4/NTFS 格式硬盘
            - 首次启动：后台安装约 5-10 分钟，查看日志：
              ```
              tail -f /var/log/extras-install.log
              tail -f /var/log/docker-install.log
              ```

          files: ${{ env.FIRMWARE_PATH }}/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Show Build Log Summary
        if: always()
        run: |
          echo "=== 构建日志摘要 ==="
          echo "build.log 大小: $(ls -lh openwrt/build.log 2>/dev/null | awk '{print $5}' || echo '无')"
          echo "build-verbose.log 大小: $(ls -lh openwrt/build-verbose.log 2>/dev/null | awk '{print $5}' || echo '无')"
          echo "=== 关键验证结果 ==="
          echo "PARTSIZE: $(grep -o 'PARTSIZE=[0-9]*' openwrt/.config 2>/dev/null | head -1 || echo '未知')"
          echo "设备锁定: $(grep 'CONFIG_TARGET_.*DEVICE.*qihoo_360v6=y' openwrt/.config 2>/dev/null && echo '成功' || echo '失败')"
          echo "=== bin 目录内容 ==="
          find openwrt/bin -name "*360v6*" -type f 2>/dev/null | sort || echo "无固件输出"
