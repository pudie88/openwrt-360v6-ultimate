name: OpenWrt Builder

on:
  push:
    branches:
      - main
    paths:
      - '.config'
      - '.github/workflows/*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual build trigger'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-openwrt:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6小时超时
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "=== Environment Info ==="
          uname -a
          df -h
          free -h
          
          # 安装OpenWrt构建依赖
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk             gettext git java-propose-classpath libelf-dev libncurses5-dev             libncursesw5-dev libssl-dev python3 python2.7-dev python3-pip             python3-setuptools python3-dev rsync subversion swig time             xsltproc zlib1g-dev unzip wget curl

      - name: Debug configuration
        run: |
          echo "=== Configuration Debug ==="
          grep -E "^(CONFIG_TARGET_ROOTFS_PARTSIZE=|CONFIG_PACKAGE_sing-box=|CONFIG_PACKAGE_dockerd=|CONFIG_PACKAGE_samba4-server=|CONFIG_PACKAGE_adguardhome=|CONFIG_PACKAGE_lucky=)" .config || true
          echo "=== Key config values ==="
          echo "PARTSIZE: $(grep '^CONFIG_TARGET_ROOTFS_PARTSIZE=' .config || echo 'NOT FOUND')"
          echo "sing-box: $(grep '^CONFIG_PACKAGE_sing-box=' .config || echo 'NOT FOUND')"

      - name: Validate PARTSIZE for 70MB build
        run: |
          if ! grep -q "^CONFIG_TARGET_ROOTFS_PARTSIZE=20" .config; then
            echo "❌ PARTSIZE is not 20"
            grep "PARTSIZE" .config || echo "(not found)"
            exit 1
          fi
          echo "✅ PARTSIZE=20 validated (extreme minimal)"

      - name: Validate sing-box is retained
        run: |
          if grep -q "^CONFIG_PACKAGE_sing-box=y" .config; then
            echo "✅ sing-box is enabled"
          else
            echo "❌ sing-box is not enabled"
            exit 1
          fi

      - name: Clone OpenWrt source
        run: |
          git clone https://github.com/openwrt/openwrt.git --depth=1 -b openwrt-24.10
          cd openwrt
          
          # 启用编译缓存
          make download
          find . -maxdepth 1 -name "*.patch" -exec rm {} \;

      - name: Apply configuration
        run: |
          cd openwrt
          cp ../.config .
          make defconfig

      - name: Download feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 检查是否有sing-box包
          echo "=== Checking for sing-box ==="
          ./scripts/feeds list | grep -i sing || echo "sing-box not in feeds"

      - name: Build firmware
        run: |
          cd openwrt
          echo "=== Starting build ==="
          echo "CPU cores: $(nproc)"
          echo "Memory: $(free -h)"
          
          # 使用更保守的并行编译，避免内存不足
          make -j$(($(nproc) - 1)) V=s 2>&1 | tee build.log || true
          
          # 检查是否构建成功
          if find bin/targets -name "*.bin" -o -name "*.img" 2>/dev/null | head -1; then
            echo "✅ Build succeeded!"
          else:
            echo "❌ Build failed, checking logs..."
            tail -100 build.log | grep -i "error\|fail\|stop" | head -20
            exit 1

      - name: Check firmware size
        if: success()
        run: |
          cd openwrt
          echo "=== Firmware size check ==="
          find bin/targets -name "*.bin" -o -name "*.img" 2>/dev/null | while read f; do
            size_bytes=$(stat -c%s "$f" 2>/dev/null || echo "0")
            size_mb=$((size_bytes / 1024 / 1024))
            if [ $size_mb -eq 0 ]; then
              echo "⚠️  Could not get size for $f"
            else
              echo "$f: ${size_mb}MB"
              
              # 验证大小是否在70MB以内
              if [ $size_mb -gt 75 ]; then
                echo "❌ Firmware too large: ${size_mb}MB > 70MB target"
                exit 1
              else:
                echo "✅ Firmware size OK: ${size_mb}MB ≤ 70MB target"
              fi
            fi
          done

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: openwrt/bin/
          if-no-files-found: error
          retention-days: 7
