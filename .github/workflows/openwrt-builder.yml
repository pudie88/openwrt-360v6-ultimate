name: Build OpenWrt for 360 V6

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/openwrt-builder.yml'

env:
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt
  REPO_BRANCH: main
  TZ: Asia/Shanghai
  ARGON_TAG: "v2.3.1"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🗑️ 释放磁盘空间
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker system prune -af --volumes 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile
          df -h
          FREE_GB=$(df -BG / | awk 'NR==2 {print $4}' | tr -d 'G')
          if [ "$FREE_GB" -lt 30 ]; then
            echo "❌ 剩余磁盘空间不足 30GB"
            exit 1
          fi

      - name: 🛠️ 安装编译依赖
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-pip rsync \
            swig unzip zlib1g-dev wget curl ca-certificates file golang-go
          sudo timedatectl set-timezone "$TZ"

      - name: 📥 克隆源码
        run: |
          set -euo pipefail
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d')" >> $GITHUB_ENV

          echo "=== 验证 360V6 设备支持 ==="
          if ! grep -q "define Device/qihoo_360v6" target/linux/qualcommax/image/ipq60xx.mk; then
            echo "❌ 当前源码不含 360V6 设备定义"
            grep "^define Device/" target/linux/qualcommax/image/ipq60xx.mk || true
            exit 1
          fi
          echo "✅ 360V6 设备定义已确认"

      - name: 📦 安装第三方插件
        run: |
          set -euo pipefail
          cd openwrt

          gh_download() {
            local url="$1" dest="$2"
            local tmp; tmp=$(mktemp /tmp/pkg_XXXXXX.tar.gz)
            curl -fSL --retry 3 --retry-delay 5 --connect-timeout 30 \
              -H "User-Agent: GitHubActions/OpenWrtBuilder" \
              -o "$tmp" "$url" || { rm -f "$tmp"; return 1; }
            gzip -t "$tmp" 2>/dev/null || { rm -f "$tmp"; return 1; }
            mkdir -p "$dest"
            tar -xzf "$tmp" -C "$dest" --strip-components=1 || { rm -f "$tmp"; return 1; }
            rm -f "$tmp"
          }

          rm -rf package/luci-theme-argon 2>/dev/null || true
          gh_download \
            "https://github.com/jerrykuku/luci-theme-argon/archive/refs/tags/${ARGON_TAG}.tar.gz" \
            "package/luci-theme-argon" && echo "✅ argon" || echo "⚠️ argon 失败"

          rm -rf package/homeproxy 2>/dev/null || true
          git clone --depth 1 https://github.com/immortalwrt/homeproxy.git \
            package/homeproxy && echo "✅ homeproxy" || echo "⚠️ homeproxy 失败"

          git clone --depth 1 https://github.com/gdy666/luci-app-lucky.git \
            package/luci-app-lucky && echo "✅ lucky" || echo "⚠️ lucky 失败"

      - name: 🔄 更新 Feeds
        run: |
          set -euo pipefail
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install ucode-mod-digest || true
          echo "=== qualcommax target 验证 ==="
          ls target/linux/ | grep -i qualcommax \
            && echo "✅ qualcommax target 存在" \
            || { echo "❌ qualcommax target 不存在"; exit 1; }

      - name: 📁 同步自定义配置文件
        run: |
          if [ -d files ]; then
            cp -rf files openwrt/
            chmod 755 openwrt/files/etc/uci-defaults/99-firstboot-setup.sh 2>/dev/null || true
            echo "✅ 自定义配置已就绪"
          else
            echo "⚠️ 未找到 files/ 目录"
          fi

      - name: ⚙️ 生成 .config
        run: |
          set -euo pipefail
          cd openwrt

          # 第一步：写入基础目标配置（使用 printf 替代 cat）
          printf '%s\n' \
            "CONFIG_TARGET_qualcommax=y" \
            "CONFIG_TARGET_qualcommax_ipq60xx=y" \
            "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" \
            > .config

          make defconfig 2>&1 | tail -3

          if ! grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "❌ defconfig 后设备符号丢失"
            grep "CONFIG_TARGET" .config | head -20
            exit 1
          fi
          echo "✅ 设备确认: qihoo_360v6"

          # 第二步：追加完整包配置（使用 printf 追加）
          printf '\n' >> .config
          printf '%s\n' \
            "CONFIG_TARGET_ROOTFS_PARTSIZE=200" \
            "CONFIG_TARGET_ROOTFS_SQUASHFS=y" \
            "CONFIG_CCACHE=y" \
            "" \
            "# LuCI" \
            "CONFIG_PACKAGE_luci=y" \
            "CONFIG_PACKAGE_luci-base=y" \
            "CONFIG_PACKAGE_luci-compat=y" \
            "CONFIG_PACKAGE_luci-lib-ipkg=y" \
            "CONFIG_PACKAGE_luci-ssl=y" \
            "CONFIG_PACKAGE_luci-theme-bootstrap=y" \
            "CONFIG_PACKAGE_luci-theme-argon=y" \
            "CONFIG_LUCI_LANG_zh_Hans=y" \
            "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" \
            "CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y" \
            "CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y" \
            "" \
            "# DNS" \
            "CONFIG_PACKAGE_dnsmasq-full=y" \
            "# CONFIG_PACKAGE_dnsmasq is not set" \
            "" \
            "# 防火墙" \
            "CONFIG_PACKAGE_firewall4=y" \
            "CONFIG_PACKAGE_nftables=y" \
            "CONFIG_PACKAGE_kmod-nft-offload=y" \
            "CONFIG_PACKAGE_kmod-nft-nat=y" \
            "CONFIG_PACKAGE_kmod-nft-bridge=y" \
            "# CONFIG_PACKAGE_iptables is not set" \
            "CONFIG_PACKAGE_opkg=y" \
            "" \
            "# 无线驱动" \
            "CONFIG_PACKAGE_kmod-ath11k=y" \
            "CONFIG_PACKAGE_kmod-ath11k-ahb=y" \
            "CONFIG_PACKAGE_ath11k-firmware-ipq6010=y" \
            "# CONFIG_PACKAGE_kmod-ath11k-pci is not set" \
            "" \
            "# 代理" \
            "CONFIG_PACKAGE_luci-app-homeproxy=y" \
            "CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y" \
            "CONFIG_PACKAGE_sing-box=y" \
            "" \
            "# AdGuardHome" \
            "CONFIG_PACKAGE_luci-app-adguardhome=y" \
            "CONFIG_PACKAGE_adguardhome=y" \
            "CONFIG_PACKAGE_luci-i18n-adguardhome-zh-cn=y" \
            "" \
            "# 内网穿透" \
            "CONFIG_PACKAGE_luci-app-lucky=y" \
            "CONFIG_PACKAGE_lucky=y" \
            "" \
            "# Docker" \
            "CONFIG_PACKAGE_docker=y" \
            "CONFIG_PACKAGE_dockerd=y" \
            "CONFIG_PACKAGE_luci-app-dockerman=y" \
            "CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y" \
            "CONFIG_PACKAGE_kmod-veth=y" \
            "CONFIG_PACKAGE_kmod-br-netfilter=y" \
            "CONFIG_PACKAGE_kmod-lib-crc32c=y" \
            "CONFIG_PACKAGE_kmod-crypto-crc32c=y" \
            "CONFIG_PACKAGE_kmod-dm=y" \
            "CONFIG_PACKAGE_kmod-overlay=y" \
            "" \
            "# 性能优化" \
            "CONFIG_PACKAGE_kmod-tcp-bbr=y" \
            "CONFIG_PACKAGE_kmod-zram=y" \
            "CONFIG_PACKAGE_zram-swap=y" \
            "CONFIG_PACKAGE_kmod-cpufreq-dt=y" \
            "CONFIG_PACKAGE_kmod-cpufreq-dt-platdev=y" \
            "" \
            "# 终端" \
            "CONFIG_PACKAGE_luci-app-ttyd=y" \
            "CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y" \
            "" \
            "# USB 存储" \
            "CONFIG_PACKAGE_kmod-usb-storage=y" \
            "CONFIG_PACKAGE_kmod-usb-storage-uas=y" \
            "CONFIG_PACKAGE_kmod-usb3=y" \
            "CONFIG_PACKAGE_kmod-fs-ext4=y" \
            "CONFIG_PACKAGE_kmod-fs-exfat=y" \
            "CONFIG_PACKAGE_kmod-fs-vfat=y" \
            "CONFIG_PACKAGE_kmod-fs-ntfs3=y" \
            "CONFIG_PACKAGE_block-mount=y" \
            "CONFIG_PACKAGE_kmod-fuse=y" \
            "CONFIG_PACKAGE_e2fsprogs=y" \
            "CONFIG_PACKAGE_fdisk=y" \
            "" \
            "# 工具" \
            "CONFIG_PACKAGE_bash=y" \
            "CONFIG_PACKAGE_htop=y" \
            "CONFIG_PACKAGE_curl=y" \
            "CONFIG_PACKAGE_wget-ssl=y" \
            "CONFIG_PACKAGE_file=y" \
            "CONFIG_PACKAGE_lsblk=y" \
            >> .config

          make defconfig 2>&1 | tail -3

          echo "=== 最终 .config 验证 ==="
          PASS=1
          chk() { grep -q "$1" .config && echo "✅ $2" || { echo "❌ $2"; PASS=0; }; }
          chk "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" "设备: 360V6"
          chk "CONFIG_PACKAGE_luci-app-homeproxy=y"  "homeproxy"
          chk "CONFIG_PACKAGE_sing-box=y"             "sing-box"
          chk "CONFIG_PACKAGE_luci-app-adguardhome=y" "AdGuardHome"
          chk "CONFIG_PACKAGE_docker=y"               "Docker"
          chk "CONFIG_CCACHE=y"                       "CCACHE"
          [ "$PASS" = "1" ] || exit 1

      - name: ⬇️ 下载软件包
        run: |
          cd openwrt
          make download -j$(nproc) || exit 1
          find dl -size -1c -exec rm -f {} \;

      - name: 🔨 编译固件
        id: compile
        run: |
          cd openwrt
          echo "🔨 CPU 核心数: $(nproc)"
          make -j$(nproc) V=s 2>&1 | tee build.log
          if [ "${PIPESTATUS[0]}" -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            grep -n " error:" build.log | grep -v "^Binary" | head -30 || true
            tail -80 build.log
            exit 1
          fi

      - name: 📦 整理固件文件
        if: ${{ steps.compile.outputs.status == 'success' }}
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          if ! ls *360v6* 2>/dev/null | grep -q .; then
            echo "❌ 未找到 360V6 固件"
            ls -lh
            exit 1
          fi
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
          ls -lh

      - name: 📤 上传 Artifacts
        if: ${{ steps.compile.outputs.status == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-360V6-${{ github.run_number }}
          path: |
            ${{ env.FIRMWARE_PATH }}/*.ubi
            ${{ env.FIRMWARE_PATH }}/*.itb
            ${{ env.FIRMWARE_PATH }}/*.bin
            ${{ env.FIRMWARE_PATH }}/*.manifest
          retention-days: 7
          if-no-files-found: warn

      - name: 🚀 发布 Release
        if: ${{ steps.compile.outputs.status == 'success' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "OpenWrt 360 V6 — Build ${{ github.run_number }} (${{ env.BUILD_DATE }})"
          files: |
            ${{ env.FIRMWARE_PATH }}/*.ubi
            ${{ env.FIRMWARE_PATH }}/*.itb
            ${{ env.FIRMWARE_PATH }}/*.bin
            ${{ env.FIRMWARE_PATH }}/*.manifest
          body: |
            ## 📦 OpenWrt for 360 V6
            - 源码: `VIKINGYFY/immortalwrt` | Commit: `${{ env.OPENWRT_COMMIT }}`
            - 构建: `${{ github.run_number }}` | 日期: `${{ env.BUILD_DATE }}`
            - **默认 IP: `192.168.1.1`** | 首次登录无需密码

            ### 刷机说明
            - 首次刷入：`squashfs-factory.ubi`
            - 在线升级：`squashfs-sysupgrade.bin`
            - 救砖测试：`initramfs-uImage.itb`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
          retention-days: 3
          if-no-files-found: ignore
