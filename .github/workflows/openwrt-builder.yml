name: Build OpenWrt for 360 V6 (128MB Optimized)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/openwrt-builder.yml'
      - '.config'
      - 'files/'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 480
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🗑 Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile
          echo "=== 释放后磁盘空间 ==="
          df -h

      - name: 🛠 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3 python3-pip \
            rsync swig unzip zlib1g-dev wget curl ca-certificates file

      - name: 📥 Clone Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: 📦 Install Custom Packages
        run: |
          cd openwrt

          # ── Argon 主题 ────────────────────────────────────────────────
          rm -rf package/luci-theme-argon
          git clone --depth 1 https://github.com/jerrykuku/luci-theme-argon.git \
            package/luci-theme-argon
          echo "✅ luci-theme-argon 克隆完成"

          # ── HomeProxy ─────────────────────────────────────────────────
          rm -rf package/homeproxy
          git clone --depth 1 https://github.com/immortalwrt/homeproxy.git \
            package/homeproxy
          echo "✅ homeproxy 克隆完成"

          # ── Lucky（sirpdboy 版本）─────────────────────────────────────
          if find feeds -name "luci-app-lucky" -maxdepth 6 -type d 2>/dev/null | grep -q .; then
            echo "✅ luci-app-lucky 已在 feeds 中"
          else
            rm -rf package/luci-app-lucky
            git clone --depth 1 https://github.com/sirpdboy/luci-app-lucky.git \
              package/luci-app-lucky \
              && echo "✅ luci-app-lucky 克隆完成" \
              || echo "⚠️  luci-app-lucky 克隆失败"
          fi

      - name: 🔄 Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ⚙️ Apply Config & Validate PARTSIZE=100
        run: |
          # 复制 .config
          cp "${GITHUB_WORKSPACE}/.config" openwrt/.config
          
          cd openwrt
          
          # 验证 PARTSIZE=100
          if ! grep -q "^CONFIG_TARGET_ROOTFS_PARTSIZE=100" .config; then
            echo "❌ 错误: PARTSIZE 不是 100"
            grep "PARTSIZE" .config || echo "(未找到)"
            exit 1
          fi
          echo "✅ PARTSIZE=100 验证通过"

          # 验证大包编译设置
          for PKG in dockerd samba4-server adguardhome lucky; do
            if grep -q "^CONFIG_PACKAGE_${PKG}=y" .config; then
              echo "✅ $PKG = y"
            else
              echo "❌ $PKG ≠ y"
              exit 1
            fi
          done

          # 验证 USB 支持
          if ! grep -q "CONFIG_PACKAGE_kmod-usb-storage=y" .config; then
            echo "❌ USB 存储支持未启用"
            exit 1
          fi
          echo "✅ USB 存储支持已启用"

          # 移除 sing-box-tiny 冲突（已修复：使用 | 分隔符）
          SINGBOX_MK="feeds/packages/net/sing-box/Makefile"
          if [ -f "$SINGBOX_MK" ]; then
            sed -i '\|define Package/sing-box-tiny|,/^endef/d' "$SINGBOX_MK"
            sed -i '\|BuildPackage,sing-box-tiny|d' "$SINGBOX_MK"
            echo "✅ 已移除 sing-box-tiny"
          fi

          # 设备锁定（只保留 qihoo_360v6）
          MK="target/linux/qualcommax/image/ipq60xx.mk"
          if [ ! -f "$MK" ]; then
            echo "❌ 设备定义文件不存在: $MK"
            exit 1
          fi
          sed -i '\|^TARGET_DEVICES +=|d' "$MK"
          echo 'TARGET_DEVICES += qihoo_360v6' >> "$MK"
          echo "✅ 设备锁定完成"

          # 清理 .config 中的旧配置（已修复：使用 | 分隔符）
          sed -i '\|CONFIG_TARGET_.*DEVICE.*|d' .config
          sed -i '\|CONFIG_TARGET_ROOTFS_PARTSIZE|d' .config
          sed -i '\|# CONFIG_PACKAGE_luci-app-opkg is not set|d' .config

          # 重新写入设备锁定
          echo 'CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y' > .temp
          cat .config >> .temp
          mv .temp .config

          # 展开配置
          make defconfig 2>&1 | tail -5

          # 最终验证
          if grep -q "^CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "✅ 设备锁定验证通过"
          else
            echo "❌ 设备锁定失败"
            exit 1
          fi

          # 复制预置配置文件
          mkdir -p files/etc/uci-defaults
          mkdir -p files/etc/sysctl.d
          mkdir -p files/root
          
          cp "${GITHUB_WORKSPACE}/files/etc/uci-defaults/99-custom-ip" \
             files/etc/uci-defaults/99-custom-ip 2>/dev/null || true
          cp "${GITHUB_WORKSPACE}/files/etc/sysctl.d/99-bbr.conf" \
             files/etc/sysctl.d/99-bbr.conf 2>/dev/null || true
          cp "${GITHUB_WORKSPACE}/files/etc/uci-defaults/98-network-check" \
             files/etc/uci-defaults/98-network-check 2>/dev/null || true
          cp "${GITHUB_WORKSPACE}/files/etc/uci-defaults/97-fix-apk-feeds" \
             files/etc/uci-defaults/97-fix-apk-feeds 2>/dev/null || true
          cp "${GITHUB_WORKSPACE}/files/etc/uci-defaults/96-install-docker" \
             files/etc/uci-defaults/96-install-docker 2>/dev/null || true
          cp "${GITHUB_WORKSPACE}/files/etc/uci-defaults/95-install-extras" \
             files/etc/uci-defaults/95-install-extras 2>/dev/null || true
          cp "${GITHUB_WORKSPACE}/files/etc/uci-defaults/94-mount-usb-docker" \
             files/etc/uci-defaults/94-mount-usb-docker 2>/dev/null || true
          cp "${GITHUB_WORKSPACE}/files/root/flashing-guide.txt" \
             files/root/flashing-guide.txt 2>/dev/null || true
          
          # 设置执行权限
          chmod +x files/etc/uci-defaults/* 2>/dev/null || true
          
          echo "✅ 预置配置文件已复制"

      - name: ⬇️ Download Packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 🔨 Compile Firmware
        id: compile
        run: |
          cd openwrt
          set -o pipefail
          echo "🔨 开始编译 ($(nproc) 线程)..."
          if make -j$(nproc) 2>&1 | tee build.log; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ 编译成功"
          else
            echo "⚠️ 多线程失败，降级单线程..."
            make -j1 V=s > build-verbose.log 2>&1
            if [ $? -eq 0 ]; then
              echo "status=success" >> $GITHUB_OUTPUT
              echo "✅ 单线程编译成功"
            else
              echo "status=failure" >> $GITHUB_OUTPUT
              echo "❌ 编译失败"
              grep -iE "error:|fatal error:" build-verbose.log | tail -30
              exit 1
            fi
          fi

      - name: 📦 Prepare Artifacts & Size Check
        if: steps.compile.outputs.status == 'success'
        run: |
          TARGET_DIR="openwrt/bin/targets/qualcommax/ipq60xx"
          if [ ! -d "$TARGET_DIR" ]; then
            echo "❌ 目标目录不存在"
            exit 1
          fi
          cd "$TARGET_DIR"
          ls -lh
          
          SYSUPGRADE_FILE=$(ls *360v6*squashfs-sysupgrade.bin 2>/dev/null | head -1)
          if [ -n "$SYSUPGRADE_FILE" ]; then
            FILE_SIZE_MB=$(( $(stat -c%s "$SYSUPGRADE_FILE") / 1024 / 1024 ))
            echo "固件大小: ${FILE_SIZE_MB}MB"
            if [ $FILE_SIZE_MB -gt 110 ]; then
              echo "❌ 固件过大: ${FILE_SIZE_MB}MB > 110MB"
              exit 1
            fi
            echo "✅ 固件大小验证通过"
          fi
          
          mkdir -p output
          cp *360v6* output/ 2>/dev/null || true
          cp sha256sums output/ 2>/dev/null || true
          
          if ls output/*360v6* >/dev/null 2>&1; then
            echo "✅ 固件准备完成"
            echo "FIRMWARE_PATH=$PWD/output" >> $GITHUB_ENV
          else
            echo "❌ 未找到固件"
            exit 1
          fi

      - name: 🚀 Upload to Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-v${{ github.run_number }}
          name: OpenWrt 360 V6 (${{ env.BUILD_DATE }})
          body: |
            ## OpenWrt for 360 V6 (128MB Flash Optimized)
            - 构建时间: ${{ env.BUILD_DATE }}
            - 源码 Commit: ${{ env.OPENWRT_COMMIT }}
            - 固件大小: ≤110MB
            
            ### 已内置功能
            - Argon 主题 / HomeProxy / Docker / Samba4 / AdGuardHome / Lucky
            - USB 自动挂载 / 文件管理器 / BBR 加速
            
            ### 默认信息
            - 管理地址: http://192.168.2.1
            - 用户名: root / 密码: 无
          files: ${{ env.FIRMWARE_PATH }}/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Show Build Log Summary
        if: always()
        run: |
          echo "=== 构建摘要 ==="
          echo "PARTSIZE: $(grep -o 'PARTSIZE=[0-9]*' openwrt/.config 2>/dev/null | head -1)"
          echo "设备锁定: $(grep 'qihoo_360v6=y' openwrt/.config 2>/dev/null && echo '成功' || echo '失败')"
          find openwrt/bin -name "*360v6*" 2>/dev/null | head -5
