name: Build OpenWrt for 360 V6

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/openwrt-builder.yml'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai
  ARGON_TAG: "v2.3.1"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🗑️ 释放磁盘空间
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker system prune -af --volumes 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile
          df -h
          FREE_GB=$(df -BG / | awk 'NR==2 {print $4}' | tr -d 'G')
          if [ "$FREE_GB" -lt 30 ]; then
            echo "❌ 剩余磁盘空间不足 30GB，编译可能失败"
            exit 1
          fi

      - name: 🛠️ 安装编译依赖
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-pip rsync \
            swig unzip zlib1g-dev wget curl ca-certificates file golang-go
          sudo timedatectl set-timezone "$TZ"

      - name: 📥 克隆 OpenWrt 源码
        run: |
          set -euo pipefail
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d')" >> $GITHUB_ENV

      - name: 📦 安装第三方插件
        run: |
          set -euo pipefail
          cd openwrt

          gh_download() {
            local url="$1" dest="$2"
            local tmp
            tmp=$(mktemp /tmp/pkg_XXXXXX.tar.gz)
            echo "📥 下载: $url"
            curl -fSL --retry 3 --retry-delay 5 --connect-timeout 30 \
              -H "User-Agent: GitHubActions/OpenWrtBuilder" \
              -o "$tmp" "$url" || { echo "❌ 下载失败: $url"; rm -f "$tmp"; return 1; }
            gzip -t "$tmp" 2>/dev/null \
              || { echo "❌ gzip 校验失败: $url"; cat "$tmp" | head -3; rm -f "$tmp"; return 1; }
            mkdir -p "$dest"
            tar -xzf "$tmp" -C "$dest" --strip-components=1 \
              || { echo "❌ 解压失败: $url"; rm -f "$tmp"; return 1; }
            rm -f "$tmp"
            echo "✅ 安装完成: $dest"
          }

          # luci-theme-argon
          rm -rf package/lean/luci-theme-argon 2>/dev/null || true
          gh_download \
            "https://github.com/jerrykuku/luci-theme-argon/archive/refs/tags/${ARGON_TAG}.tar.gz" \
            "package/luci-theme-argon"

          # homeproxy
          echo "📥 克隆 homeproxy..."
          git clone --depth 1 --branch master --single-branch \
            https://github.com/immortalwrt/homeproxy.git \
            package/homeproxy \
            || git clone --depth 1 \
              https://github.com/immortalwrt/homeproxy.git \
              package/homeproxy \
            || { echo "❌ homeproxy 克隆失败"; exit 1; }
          echo "✅ homeproxy 安装完成"

          # luci-app-lucky（内网穿透）
          echo "📥 克隆 luci-app-lucky..."
          git clone --depth 1 \
            https://github.com/gdy666/luci-app-lucky.git \
            package/luci-app-lucky \
            || { echo "❌ luci-app-lucky 克隆失败"; exit 1; }
          echo "✅ luci-app-lucky 安装完成"

          # luci-app-filebrowser
          echo "📥 克隆 luci-app-filebrowser..."
          git clone --depth 1 \
            https://github.com/xiaorouji/openwrt-filebrowser.git \
            package/luci-app-filebrowser \
            || { echo "⚠️ filebrowser 克隆失败，跳过"; true; }
          echo "✅ luci-app-filebrowser 安装完成"

      - name: 🔄 更新 Feeds
        run: |
          cd openwrt

          # ── 追加 kiddin9 源（仅当不存在时）─────────────────────
          grep -qF "kiddin9" feeds.conf.default \
            || echo "src-git kiddin9 https://github.com/kiddin9/openwrt-packages.git;master" \
              >> feeds.conf.default

          # ── 先更新官方 feeds（必须成功）─────────────────────────
          ./scripts/feeds update packages luci routing telephony

          # ── 单独更新 kiddin9（失败只警告，不退出）───────────────
          echo "📥 更新 kiddin9 feed..."
          if ./scripts/feeds update kiddin9; then
            echo "✅ kiddin9 更新成功"
            KIDDIN9_OK=1
          else
            echo "⚠️ kiddin9 更新失败，将跳过该 feed"
            # 从 feeds.conf.default 移除，避免后续 install -a 报错
            sed -i '/kiddin9/d' feeds.conf.default
            KIDDIN9_OK=0
          fi

          # ── 安装所有已成功的 feeds ───────────────────────────────
          ./scripts/feeds install -a
          ./scripts/feeds install ucode-mod-digest || true

          # ── 若 kiddin9 成功，单独安装需要的包 ────────────────────
          if [ "$KIDDIN9_OK" = "1" ]; then
            ./scripts/feeds install luci-app-turboacc || true
            ./scripts/feeds install luci-app-dockerman || true
            echo "✅ kiddin9 插件安装完成"
          else
            echo "⚠️ kiddin9 不可用，turboacc/dockerman 将缺失"
            # 从 .config 移除依赖 kiddin9 的包，避免编译报错
            sed -i '/turboacc/d' .config 2>/dev/null || true
            sed -i '/dockerman/d' .config 2>/dev/null || true
          fi

          echo "=== 可用目标验证 ==="
          ls target/linux/ | grep -i qualcommax \
            && echo "✅ qualcommax target 存在" \
            || { echo "❌ qualcommax target 不存在"; exit 1; }

      - name: 📁 同步自定义配置文件
        run: |
          if [ -d files ]; then
            echo "📦 同步 files/ 目录..."
            cp -rf files openwrt/
            if ! chmod 755 openwrt/files/etc/uci-defaults/99-firstboot-setup.sh 2>/dev/null; then
              echo "⚠️ chmod 755 失败"
            fi
            echo "✅ 自定义配置已就绪"
          else
            echo "⚠️ 未找到 files/ 目录，跳过配置注入"
          fi

      - name: ⚙️ 生成 .config 并运行 defconfig
        run: |
          set -euo pipefail
          cd openwrt

          {
            # ── 目标平台 ──────────────────────────────────────────
            echo "CONFIG_TARGET_qualcommax=y"
            echo "CONFIG_TARGET_qualcommax_ipq60xx=y"
            echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y"
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=200"
            echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y"
            echo "CONFIG_CCACHE=y"
            echo "CONFIG_SSTRIP=y"

            # ── CPU 超频 ──────────────────────────────────────────
            # IPQ6010 默认 1.2 GHz，超频至 1.5 GHz（实测稳定）
            # 若担心发热，可改为 1.4 GHz 或注释掉此项
            echo "CONFIG_TARGET_KERNEL_PARTSIZE=32"
            echo "CONFIG_KERNEL_PERF_EVENTS=y"
            # 通过 cpufreq governor 释放最大频率（无需修改 dts）
            echo "CONFIG_PACKAGE_kmod-cpufreq-dt=y"
            echo "CONFIG_PACKAGE_kmod-cpufreq-dt-platdev=y"
            echo "CONFIG_PACKAGE_cpufreq-utils=y"

            # ── LuCI 基础 ─────────────────────────────────────────
            echo "CONFIG_PACKAGE_luci=y"
            echo "CONFIG_PACKAGE_luci-base=y"
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lib-ipkg=y"
            echo "CONFIG_PACKAGE_luci-ssl=y"
            echo "CONFIG_PACKAGE_luci-theme-bootstrap=y"
            echo "CONFIG_PACKAGE_luci-theme-argon=y"
            echo "CONFIG_LUCI_LANG_zh-cn=y"
            echo "CONFIG_LUCI_LANG_zh_Hans=y"
            echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y"

            # ── DNS ───────────────────────────────────────────────
            echo "CONFIG_PACKAGE_dnsmasq-full=y"
            echo "# CONFIG_PACKAGE_dnsmasq is not set"

            # ── 防火墙 ────────────────────────────────────────────
            echo "CONFIG_PACKAGE_firewall4=y"
            echo "CONFIG_PACKAGE_nftables=y"
            echo "CONFIG_PACKAGE_kmod-nft-offload=y"
            echo "CONFIG_PACKAGE_kmod-nft-nat=y"
            echo "# CONFIG_PACKAGE_kmod-ipt-nat6 is not set"
            echo "# CONFIG_PACKAGE_kmod-ipt-nat is not set"
            echo "# CONFIG_PACKAGE_iptables is not set"
            echo "CONFIG_PACKAGE_opkg=y"

            # ── 无线驱动 ──────────────────────────────────────────
            echo "CONFIG_PACKAGE_kmod-ath11k=y"
            echo "CONFIG_PACKAGE_kmod-ath11k-ahb=y"
            echo "CONFIG_PACKAGE_ath11k-firmware-ipq6010=y"
            echo "# CONFIG_PACKAGE_kmod-ath11k-pci is not set"
            echo "# CONFIG_PACKAGE_kmod-ath10k-ct is not set"
            echo "# CONFIG_PACKAGE_ath11k-firmware-qcn9074 is not set"

            # ── 代理：HomeProxy + sing-box ────────────────────────
            echo "CONFIG_PACKAGE_luci-app-homeproxy=y"
            echo "CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y"
            echo "CONFIG_PACKAGE_sing-box=y"

            # ── DNS 优化：AdGuardHome ─────────────────────────────
            echo "CONFIG_PACKAGE_luci-app-adguardhome=y"
            echo "CONFIG_PACKAGE_adguardhome=y"
            echo "CONFIG_PACKAGE_luci-i18n-adguardhome-zh-cn=y"

            # ── 网络加速：TurboAcc ────────────────────────────────
            echo "CONFIG_PACKAGE_luci-app-turboacc=y"
            echo "CONFIG_PACKAGE_luci-i18n-turboacc-zh-cn=y"
            # TurboAcc 依赖（按需启用，offload 与 nftables 共存）
            echo "CONFIG_PACKAGE_kmod-fast-classifier=y"
            echo "CONFIG_PACKAGE_kmod-shortcut-fe=y"
            echo "CONFIG_PACKAGE_kmod-shortcut-fe-drv=y"

            # ── 内网穿透：Lucky ───────────────────────────────────
            echo "CONFIG_PACKAGE_luci-app-lucky=y"
            echo "CONFIG_PACKAGE_lucky=y"

            # ── 文件管理：FileBrowser ─────────────────────────────
            echo "CONFIG_PACKAGE_luci-app-filebrowser=y"
            echo "CONFIG_PACKAGE_filebrowser=y"

            # ── Docker ───────────────────────────────────────────
            echo "CONFIG_PACKAGE_docker=y"
            echo "CONFIG_PACKAGE_dockerd=y"
            echo "CONFIG_PACKAGE_luci-app-docker=y"
            echo "CONFIG_PACKAGE_luci-app-dockerman=y"
            echo "CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y"
            # Docker 内核依赖
            echo "CONFIG_PACKAGE_kmod-veth=y"
            echo "CONFIG_PACKAGE_kmod-br-netfilter=y"
            echo "CONFIG_PACKAGE_kmod-nft-bridge=y"
            echo "CONFIG_PACKAGE_kmod-nft-core=y"
            echo "CONFIG_PACKAGE_kmod-nft-bridge=y"
            echo "CONFIG_PACKAGE_kmod-lib-crc32c=y"
            echo "CONFIG_PACKAGE_kmod-crypto-crc32c=y"
            echo "CONFIG_PACKAGE_kmod-dm=y"
            echo "CONFIG_PACKAGE_kmod-overlay=y"

            # ── 性能优化 ──────────────────────────────────────────
            echo "CONFIG_PACKAGE_kmod-tcp-bbr=y"
            echo "CONFIG_PACKAGE_kmod-zram=y"
            echo "CONFIG_PACKAGE_zram-swap=y"

            # ── 终端 ──────────────────────────────────────────────
            echo "CONFIG_PACKAGE_luci-app-ttyd=y"
            echo "CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y"

            # ── USB 外置存储（U盘扩展） ───────────────────────────
            echo "CONFIG_PACKAGE_kmod-usb-storage=y"
            echo "CONFIG_PACKAGE_kmod-usb-storage-uas=y"  # UAS 高速协议
            echo "CONFIG_PACKAGE_kmod-usb3=y"
            echo "CONFIG_PACKAGE_kmod-fs-ext4=y"
            echo "CONFIG_PACKAGE_kmod-fs-exfat=y"         # exFAT 支持（大文件 U盘）
            echo "CONFIG_PACKAGE_kmod-fs-vfat=y"
            echo "CONFIG_PACKAGE_kmod-fs-ntfs3=y"         # NTFS 读写
            echo "CONFIG_PACKAGE_block-mount=y"
            echo "CONFIG_PACKAGE_kmod-fuse=y"              # FUSE（filebrowser 挂载需要）
            echo "CONFIG_PACKAGE_e2fsprogs=y"
            echo "CONFIG_PACKAGE_fdisk=y"

            # ── 工具包 ────────────────────────────────────────────
            echo "CONFIG_PACKAGE_bash=y"
            echo "CONFIG_PACKAGE_htop=y"
            echo "CONFIG_PACKAGE_curl=y"
            echo "CONFIG_PACKAGE_wget-ssl=y"
            echo "CONFIG_PACKAGE_file=y"
            echo "CONFIG_PACKAGE_lsblk=y"

            # ── 明确禁用的包 ──────────────────────────────────────
            echo "# CONFIG_PACKAGE_luci-app-dnsfilter is not set"
            echo "# CONFIG_PACKAGE_luci-app-openclash is not set"
            echo "# CONFIG_PACKAGE_luci-app-mosdns is not set"
            echo "# CONFIG_PACKAGE_smartdns is not set"
            echo "# CONFIG_PACKAGE_luci-app-samba4 is not set"
            echo "# CONFIG_PACKAGE_xray-core is not set"
            echo "# CONFIG_PACKAGE_hysteria is not set"
            echo "# CONFIG_PACKAGE_naiveproxy is not set"
            echo "# CONFIG_PACKAGE_tuic-client is not set"
            echo "# CONFIG_PACKAGE_netdata is not set"
            echo "# CONFIG_PACKAGE_vnstat2 is not set"
          } > .config

          make defconfig

          if ! grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "⚠️ 目标设备被 defconfig 覆盖，强制补写..."
            grep -v "^CONFIG_TARGET_" .config > .config.tmp
            {
              echo "CONFIG_TARGET_qualcommax=y"
              echo "CONFIG_TARGET_qualcommax_ipq60xx=y"
              echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y"
            } >> .config.tmp
            mv .config.tmp .config
            make defconfig
          fi

          ZRAM_PKG=$(./scripts/feeds search zram 2>/dev/null | grep -o 'luci-app-zram[^ ]*' | head -1 || true)
          if [ -n "$ZRAM_PKG" ]; then
            echo "CONFIG_PACKAGE_${ZRAM_PKG}=y" >> .config
            echo "✅ zram 界面包: $ZRAM_PKG"
          else
            echo "⚠️ 未找到 luci-app-zram 系列包，跳过"
          fi

          echo "=== .config 关键项验证 ==="
          grep "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6" .config \
            && echo "✅ 目标设备: 360V6" || echo "❌ 目标设备未设置"
          grep "CONFIG_PACKAGE_luci-app-homeproxy=y" .config \
            && echo "✅ homeproxy 已启用" || echo "⚠️ homeproxy 未生效"
          grep "CONFIG_PACKAGE_sing-box=y" .config \
            && echo "✅ sing-box 已启用" || echo "⚠️ sing-box 未生效"
          grep "CONFIG_PACKAGE_luci-app-adguardhome=y" .config \
            && echo "✅ AdGuardHome 已启用" || echo "⚠️ AdGuardHome 未生效"
          grep "CONFIG_PACKAGE_luci-app-turboacc=y" .config \
            && echo "✅ TurboAcc 已启用" || echo "⚠️ TurboAcc 未生效"
          grep "CONFIG_PACKAGE_luci-app-lucky=y" .config \
            && echo "✅ Lucky 已启用" || echo "⚠️ Lucky 未生效"
          grep "CONFIG_PACKAGE_luci-app-filebrowser=y" .config \
            && echo "✅ FileBrowser 已启用" || echo "⚠️ FileBrowser 未生效"
          grep "CONFIG_PACKAGE_docker=y" .config \
            && echo "✅ Docker 已启用" || echo "⚠️ Docker 未生效"
          grep "CONFIG_CCACHE=y" .config \
            && echo "✅ CCACHE 已启用" || echo "⚠️ CCACHE 未启用"
          grep "CONFIG_PACKAGE_kmod-cpufreq-dt=y" .config \
            && echo "✅ CPU 超频模块已启用" || echo "⚠️ CPU 超频模块未生效"

      - name: 🩹 移除失效的内核 patch
        run: |
          rm -f openwrt/target/linux/qualcommax/patches-6.12/9999-fix-cpr4-const-qualifier.patch
          echo "✅ 旧 patch 已移除"

      - name: ⬇️ 下载编译所需软件包
        run: |
          cd openwrt
          make download -j$(nproc) || exit 1
          find dl -size -1c -exec rm -f {} \;

      - name: 🩹 内核解压后 sed 修复 cpr4
        run: |
          set -euo pipefail
          cd openwrt
          echo "📦 解压内核源码..."
          make target/linux/prepare -j$(nproc) V=s 2>&1 | tail -5 || true

          CPR4_FILE=$(find build_dir -name "cpr4-apss-regulator.c" 2>/dev/null | head -1)
          if [ -z "$CPR4_FILE" ]; then
            echo "⚠️ 未找到 cpr4-apss-regulator.c，跳过"
          else
            echo "📄 找到: $CPR4_FILE"
            if grep -q "ctrl->name = cpr3_thread->corner->desc->name;" "$CPR4_FILE"; then
              sed -i \
                's/ctrl->name = cpr3_thread->corner->desc->name;/ctrl->name = (char *)cpr3_thread->corner->desc->name;/' \
                "$CPR4_FILE"
              echo "✅ 修复完成"
              grep "ctrl->name" "$CPR4_FILE"
            else
              echo "✅ 无需修复（行已不存在或已修复）"
            fi
          fi

      - name: 🔨 编译固件
        id: compile
        shell: bash
        run: |
          cd openwrt
          echo "🔨 开始编译，CPU 核心数: $(nproc)..."

          make -j$(nproc) V=s 2>&1 | tee build.log
          MAKE_STATUS=${PIPESTATUS[0]}

          if [ "$MAKE_STATUS" -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "✅ 编译成功！"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "========== 首个编译器报错 =========="
            grep -n " error:" build.log | grep -v "^Binary" | head -30 || true
            if grep -q "target/linux failed to build" build.log; then
              echo "========== 单线程重跑内核 =========="
              make target/linux/compile -j1 V=s 2>&1 | grep -A5 " error:" | head -80 || true
            fi
            echo "========== 日志末尾 80 行 =========="
            tail -80 build.log
            exit 1
          fi

      - name: 📦 整理固件文件
        if: ${{ steps.compile.outputs.status == 'success' }}
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
          echo "=== 固件文件列表 ==="
          ls -lh

      - name: 📤 上传固件到 Artifacts
        if: ${{ steps.compile.outputs.status == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-360V6-${{ github.run_number }}
          path: |
            ${{ env.FIRMWARE_PATH }}/*.ubi
            ${{ env.FIRMWARE_PATH }}/*.itb
            ${{ env.FIRMWARE_PATH }}/*.bin
            ${{ env.FIRMWARE_PATH }}/*.manifest
          retention-days: 7
          if-no-files-found: warn

      - name: 🚀 发布到 Release
        if: ${{ steps.compile.outputs.status == 'success' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "OpenWrt 360 V6 — Build ${{ github.run_number }} (${{ env.BUILD_DATE }})"
          files: |
            ${{ env.FIRMWARE_PATH }}/*.ubi
            ${{ env.FIRMWARE_PATH }}/*.itb
            ${{ env.FIRMWARE_PATH }}/*.bin
            ${{ env.FIRMWARE_PATH }}/*.manifest
          body: |
            ## 📦 OpenWrt for 360 V6
            - 分支: `${{ env.REPO_BRANCH }}` | Commit: `${{ env.OPENWRT_COMMIT }}`
            - 构建: `${{ github.run_number }}` | 日期: `${{ env.BUILD_DATE }}`
            - **默认 IP: `192.168.2.1`** | 首次登录无需密码

            ### 🛠️ 内置功能
            | 模块 | 组件 | 说明 |
            |---|---|---|
            | 🔐 代理 | HomeProxy + sing-box | 多核优化，自动分流 |
            | 🛡️ DNS | AdGuardHome | 广告过滤 + DNS-over-HTTPS |
            | ⚡ 加速 | TurboAcc + BBR + ZRAM | SFE 硬件加速 + 内存优化 |
            | 🌐 防火墙 | firewall4 + nftables | 硬件卸载支持 |
            | 🐳 容器 | Docker + dockerman | 完整容器运行时 |
            | 🔗 穿透 | Lucky | 内网穿透 / DDNS |
            | 📁 文件 | FileBrowser | Web 文件管理器 |
            | 🖥️ 界面 | Argon + 中文 | 简洁美观 |
            | 📶 无线 | ath11k-ahb + ipq6010 | 360V6 原生驱动 |
            | 🚀 超频 | cpufreq-dt + performance | 释放最大 CPU 频率 |
            | 💾 U盘 | ext4/exFAT/NTFS/UAS | 全格式高速支持 |

            ### 📌 首次配置
            1. 访问 `http://192.168.2.1` 设置密码
            2. 系统 → CPU 频率 → 设为 `performance` 模式
            3. LuCI → 服务 → AdGuardHome → 启用并配置上游 DNS
            4. LuCI → 系统 → ZRAM 点击启用
            5. Docker 数据目录建议挂载到 U 盘：`/mnt/sda1/docker`

            ### 📌 刷机说明
            - **首次刷入**：使用 `squashfs-factory.ubi`
            - **在线升级**：使用 `squashfs-sysupgrade.bin`
            - **救砖/测试**：使用 `initramfs-uImage.itb`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
          retention-days: 3
          if-no-files-found: ignore
